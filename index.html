<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Conversor Universal</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#3182ce">
    <meta name="apple-mobile-web-app-capable" content="yes">
    
    <script src="https://cdn.jsdelivr.net/npm/heic2any@0.0.4/dist/heic2any.min.js"></script>
    
    <style>
        * { box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #f5f7fb; color: #2d3748;
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh; margin: 0; padding: 20px;
        }
        .container {
            background-color: #ffffff; padding: 35px 24px;
            border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            text-align: center; width: 100%; max-width: 380px;
        }
        h2 { margin-top: 0; font-size: 22px; color: #1a202c; font-weight: 700; }
        p { font-size: 14px; color: #718096; margin-bottom: 20px; line-height: 1.5; }
        
        .alerta { background-color: #ebf8ff; border-left: 4px solid #3182ce; color: #2b6cb0; padding: 12px; border-radius: 8px; font-size: 13px; text-align: left; margin-bottom: 20px; }
        
        input[type="file"] { display: none; }
        .btn-escolher {
            display: block; background-color: #edf2f7; color: #4a5568; padding: 16px; border-radius: 12px; font-weight: 600; cursor: pointer; margin-bottom: 12px; border: 2px dashed #cbd5e0;
        }
        #fileCount { font-size: 14px; color: #38a169; font-weight: 600; margin-bottom: 25px; }
        
        .btn-converter { background-color: #3182ce; color: white; border: none; padding: 16px; font-size: 16px; font-weight: 700; border-radius: 12px; width: 100%; cursor: pointer; }
        #status { margin-top: 20px; font-size: 14px; font-weight: 600; color: #dd6b20; min-height: 20px; }
        canvas { display: none; }

        /* ESTILOS DO POP-UP DE INSTALAÇÃO */
        #installBanner {
            display: none; /* Escondido por padrão */
            position: fixed; bottom: 0; left: 0; width: 100%;
            background-color: #1a202c; color: white;
            padding: 16px 20px;
            box-shadow: 0 -4px 15px rgba(0,0,0,0.2);
            z-index: 1000;
            display: flex; justify-content: space-between; align-items: center;
            border-top-left-radius: 16px; border-top-right-radius: 16px;
            transform: translateY(100%); transition: transform 0.4s ease-out;
        }
        #installBanner.show { transform: translateY(0); display: flex; }
        .banner-text { text-align: left; font-size: 13px; line-height: 1.4; flex: 1; margin-right: 15px; }
        .banner-text strong { display: block; font-size: 15px; margin-bottom: 4px; }
        .banner-buttons { display: flex; flex-direction: column; gap: 8px; }
        .btn-instalar-app { background-color: #48bb78; color: white; border: none; padding: 8px 16px; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 14px; }
        .btn-ignorar { background: none; color: #a0aec0; border: none; font-size: 12px; cursor: pointer; text-decoration: underline; }
    </style>
</head>
<body>

    <div class="container">
        <h2>Lote para Intranet</h2>
        <p>Selecione <b>qualquer arquivo</b>. Fotos viram JPG otimizado e outros arquivos serão renomeados.</p>
        
        <div class="alerta">💡 Toque em <strong>Permitir</strong> quando o celular perguntar sobre múltiplos downloads.</div>

        <label for="fileInput" class="btn-escolher">📁 Selecionar Arquivos</label>
        <input type="file" id="fileInput" multiple onchange="atualizarContagem()">
        
        <div id="fileCount">Nenhum arquivo selecionado</div>
        <button id="btnConverter" class="btn-converter" onclick="iniciarConversaoLote()">Processar e Baixar Tudo</button>
        <div id="status"></div>
        <canvas id="canvas"></canvas>
    </div>

    <!-- POP-UP DE INSTALAÇÃO (BANNER INFERIOR) -->
    <div id="installBanner">
        <div class="banner-text">
            <strong>Instalar Aplicativo</strong>
            Adicione à tela inicial para usar mais rápido no dia a dia.
        </div>
        <div class="banner-buttons">
            <button id="btnInstallConfirm" class="btn-instalar-app">Instalar</button>
            <button id="btnInstallClose" class="btn-ignorar">Agora não</button>
        </div>
    </div>

    <script>
        // --- LÓGICA DO POP-UP DE INSTALAÇÃO ---
        let deferredPrompt;
        const installBanner = document.getElementById('installBanner');
        const btnInstallConfirm = document.getElementById('btnInstallConfirm');
        const btnInstallClose = document.getElementById('btnInstallClose');

        // Escuta o sinal do Android avisando que o app pode ser instalado
        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault(); // Impede o mini-banner padrão do Chrome
            deferredPrompt = e; // Salva o evento para usar no nosso botão
            installBanner.classList.add('show'); // Mostra o nosso pop-up bonitão
        });

        // Quando o vendedor clica no NOSSO botão de instalar
        btnInstallConfirm.addEventListener('click', async () => {
            installBanner.classList.remove('show'); // Esconde o banner
            if (deferredPrompt) {
                deferredPrompt.prompt(); // Abre a telinha oficial de instalação do Android
                const { outcome } = await deferredPrompt.userChoice;
                deferredPrompt = null;
            }
        });

        // Quando o vendedor recusa a instalação
        btnInstallClose.addEventListener('click', () => {
            installBanner.classList.remove('show');
        });


        // --- LÓGICA DE SERVICE WORKER (PWA) ---
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js').catch((err) => console.log(err));
        }

        // --- LÓGICA DO CONVERSOR (Mantida intacta) ---
        const ordinaisFem = ["Primeira", "Segunda", "Terceira", "Quarta", "Quinta", "Sexta", "Setima", "Oitava", "Nona", "Decima"];
        const ordinaisMasc = ["Primeiro", "Segundo", "Terceiro", "Quarto", "Quinto", "Sexto", "Setimo", "Oitavo", "Nono", "Decimo"];

        function atualizarContagem() {
            const input = document.getElementById('fileInput');
            const fileCount = document.getElementById('fileCount');
            const qtd = input.files.length;
            fileCount.innerText = qtd === 0 ? "Nenhum arquivo selecionado" : (qtd === 1 ? "1 arquivo selecionado" : `${qtd} arquivos selecionados`);
        }

        async function iniciarConversaoLote() {
            const input = document.getElementById('fileInput');
            const botao = document.getElementById('btnConverter');
            const status = document.getElementById('status');
            const arquivos = input.files;
            
            if (arquivos.length === 0) return alert("Selecione pelo menos um arquivo!");
            botao.disabled = true;

            for (let i = 0; i < arquivos.length; i++) {
                let arq = arquivos[i];
                let ext = arq.name.includes('.') ? arq.name.split('.').pop().toLowerCase() : '';
                
                const isPDF = arq.type === 'application/pdf' || ext === 'pdf';
                const isHEIC = ext === 'heic' || ext === 'heif' || arq.type === 'image/heic';
                const isImg = arq.type.startsWith('image/') && !isHEIC;
                
                let nome = (isImg || isHEIC) ? ((i<10) ? `${ordinaisFem[i]}Foto.jpg` : `Foto${i+1}.jpg`) :
                           (isPDF) ? ((i<10) ? `${ordinaisMasc[i]}Documento.pdf` : `Documento${i+1}.pdf`) :
                           ((i<10) ? `${ordinaisMasc[i]}Arquivo.${ext}` : `Arquivo${i+1}.${ext}`);

                if (isHEIC) {
                    status.innerText = `Traduzindo HEIC: ${nome}...`; status.style.color = "#805ad5";
                    try {
                        const conv = await heic2any({ blob: arq, toType: "image/jpeg" });
                        await processarImagem(Array.isArray(conv) ? conv[0] : conv, nome, 0.8);
                    } catch (e) { await processarGenerico(arq, nome.replace('.jpg', '.heic')); }
                } else if (isImg) {
                    status.innerText = `Processando: ${nome}...`; status.style.color = "#dd6b20";
                    await processarImagem(arq, nome, 0.8);
                } else {
                    status.innerText = `Renomeando: ${nome}...`; status.style.color = "#3182ce";
                    await processarGenerico(arq, nome);
                }
                await new Promise(r => setTimeout(r, 1000));
            }
            status.innerText = "✅ Concluído!"; botao.disabled = false; status.style.color = "#38a169";
        }

        function processarGenerico(arq, nome) {
            return new Promise(res => {
                const url = URL.createObjectURL(arq);
                const a = document.createElement('a'); a.download = nome; a.href = url; a.click();
                setTimeout(() => URL.revokeObjectURL(url), 1000); res();
            });
        }

        function processarImagem(arq, nome, qual) {
            return new Promise(res => {
                const leitor = new FileReader();
                leitor.onload = e => {
                    const img = new Image();
                    img.onload = () => {
                        const cvs = document.getElementById('canvas');
                        let w = img.width, h = img.height;
                        if (w > 1920) { h = Math.round(h * (1920 / w)); w = 1920; }
                        cvs.width = w; cvs.height = h;
                        const ctx = cvs.getContext('2d');
                        ctx.fillStyle = "#FFF"; ctx.fillRect(0, 0, w, h); ctx.drawImage(img, 0, 0, w, h);
                        const a = document.createElement('a'); a.download = nome; a.href = cvs.toDataURL('image/jpeg', qual); a.click();
                        res(); 
                    }; img.src = e.target.result;
                }; leitor.readAsDataURL(arq);
            });
        }
    </script>
</body>
</html>
